<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GvO Accesorios Móviles | Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --dark-bg: #050505; 
            --surface-color: #121212; 
            --surface-light: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: rgba(255, 255, 255, 0.08);
            --whatsapp-green: #25d366;
        }

        body { 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden;
        }

        /* --- Loader Premium --- */
        #loader-wrapper {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: var(--dark-bg);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-container { 
            position: relative; 
            width: 80px; 
            height: 80px; 
        }
        .loader-ring {
            position: absolute; 
            width: 100%; 
            height: 100%;
            border: 2px solid transparent; 
            border-top-color: #ffffff; 
            border-bottom-color: #ffffff;
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        .loader-ring-inner {
            position: absolute; 
            top: 15px; 
            left: 15px; 
            right: 15px; 
            bottom: 15px;
            border: 2px solid transparent; 
            border-left-color: var(--text-muted); 
            border-right-color: var(--text-muted);
            border-radius: 50%;
            animation: spin-reverse 1s linear infinite;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        @keyframes spin-reverse { 
            to { transform: rotate(-360deg); } 
        }
        .loader-text {
            margin-top: 25px; 
            font-size: 0.75rem; 
            letter-spacing: 4px;
            text-transform: uppercase; 
            color: var(--text-muted); 
            font-weight: 400;
        }
        .loader-hidden { 
            opacity: 0; 
            visibility: hidden; 
        }

        /* --- Navegación --- */
        .navbar { 
            background: rgba(5, 5, 5, 0.8) !important; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            padding: 1.2rem 0;
        }
        .navbar-brand { 
            font-weight: 800; 
            letter-spacing: 2px;
            font-size: 1.4rem;
            color: #fff !important;
            text-transform: uppercase;
        }

        /* --- Textos y Títulos Premium --- */
        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #71717a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .badge-premium { 
            display: inline-block;
            font-size: 0.75rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            background: transparent; 
            color: var(--text-muted);
            padding: 8px 20px; 
            border: 1px solid var(--border-color); 
            border-radius: 50px; 
            margin-bottom: 1.5rem;
        }

        /* --- Tarjetas de Producto --- */
        .card { 
            background-color: var(--surface-color); 
            border-radius: 24px; 
            border: 1px solid var(--border-color); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden;
            height: 100%;
            padding: 10px;
        }
        .card:hover { 
            transform: translateY(-8px); 
            background-color: var(--surface-light);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .img-container {
            background: #ffffff;
            border-radius: 16px;
            padding: 1.5rem;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .card-img-top { 
            max-height: 100%; 
            object-fit: contain; 
            transition: transform 0.3s ease;
        }
        .card:hover .card-img-top {
            transform: scale(1.05);
        }
        .card-body {
            padding: 1.5rem 0.5rem 0.5rem 0.5rem;
        }
        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        .precio-tag { 
            color: #fff; 
            font-weight: 800; 
            font-size: 1.3rem; 
            letter-spacing: -0.5px;
        }

        /* --- Botón WhatsApp Premium --- */
        .btn-whatsapp { 
            background: #ffffff; 
            color: #000000; 
            font-weight: 600; 
            border-radius: 50px; 
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-whatsapp:hover { 
            background: var(--whatsapp-green);
            color: #ffffff;
            transform: scale(1.02);
        }

        /* --- Modales --- */
        .modal-content { 
            background-color: var(--surface-color); 
            border-radius: 28px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-header { 
            border-bottom: none; 
            padding-bottom: 0; 
        }
        .modal-body { 
            padding: 2rem; 
        }
        .modal-img-wrapper {
            background: #ffffff;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
        }
        .btn-close { 
            filter: invert(1); 
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .btn-close:hover { 
            opacity: 1; 
        }
        .detalle-texto {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.8;
            white-space: pre-line;
            text-align: left;
            font-weight: 300;
        }

        /* --- Footer --- */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 4rem 0;
            margin-top: 5rem;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <div class="loader-ring-inner"></div>
        </div>
        <div class="loader-text">Iniciando Experiencia</div>
    </div>

    <nav class="navbar mb-5">
        <div class="container justify-content-center">
            <span class="navbar-brand">GvO Móviles</span>
        </div>
    </nav>

    <div class="container mb-5 text-center">
        <div class="badge-premium">La Habana, Cuba</div>
        <h1 class="gradient-text display-4 mb-3" style="letter-spacing: -1px;">Calidad Absoluta.<br>Conexión Total.</h1>
        <p class="text-muted" style="max-width: 500px; margin: 0 auto;">Descubre nuestra selección de accesorios premium diseñados para mantenerte siempre cargado y conectado.</p>
    </div>

    <div class="container">
        <div class="row row-cols-2 row-cols-md-3 g-4" id="contenedor-productos">
            </div>
    </div>

    <footer class="text-center text-muted">
        <div class="container">
            <p class="mb-2" style="font-size: 0.9rem; letter-spacing: 1px;">📍 La Habana, Cuba | 📞 +53 58870159</p>
            <div class="small" style="opacity: 0.5;">© 2026 GvO Accesorios Móviles. Todos los derechos reservados.</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const productos = [
            { id: 1, nombre: "Linterna Buytiti SD-559", precio: "$8usd", disponible: true, img: "Linterna Buytiti.jpg", detalle: `Linterna Buytiti SD-559 recargable de alta potencia para uso táctico. Zoom telescópico e indicador de batería USB-C.` },
            { id: 2, nombre: "Cargador Samsung 45W", precio: "$8usd", disponible: true, img: "Cargador Samsung 45W.jpg", detalle: `Cargador Samsung Travel Adapter de 45W con tecnología de carga superrápida 2.0.\n\n✅ Potencia: Ofrece una capacidad de carga de 45 vatios para dispositivos compatibles.\n✅ Tecnología: Cuenta con la tecnología Super Fast Charging 2.0 para una carga eficiente.\n✅ Conectividad: Incluye un cable USB tipo C a tipo C de 5 amperios.\n✅ Compatibilidad: Diseñado para teléfonos de gama alta como la serie Galaxy S20 Ultra, Note10+ y superiores.` },
            { id: 3, nombre: "Cargador Moreka 40W", precio: "$7usd", disponible: true, img: "1001841152.jpg", detalle: `Cargador Superrápido Moreka modelo AC111.\n\nPotencia: 40W en total, con puertos de 20W PD y 20W QC 3.0.\n\nContenido: Incluye el cubo cargador y un cable Tipo-C a Tipo-C de 1 metro.\n\nCaracterísticas: Cuenta con protección contra sobrecarga.` },
            { id: 4, nombre: "Power Bank Solar 30,000mAh", precio: "$35usd", disponible: true, img: "Cargador Portátil 30000mAh.jpg", detalle: `Cargador Portátil de Panel Solar ☀️ con múltiples cables integrados.\n\n✅ Capacidad: 30,000 mAh (111Wh/3.7V), lo que permite múltiples cargas completas para la mayoría de los teléfonos inteligentes.\n\n✅ Cables Integrados:\n✔️ Tipo-C / V8 / (IPhone /iPad)\n✔️ USB estándar: Para recargar la propia batería\n\n✅ Panel Solar con indicador.` },
            { id: 5, nombre: "Power Bank Buytiti 10,000mAh", precio: "$13usd", disponible: true, img: "Cargador Portátil 10000mAh.jpg", detalle: `Cargador Portátil Buytiti de 10000mAh.\n\nCapacidad: 10000 mAh, capaz de proporcionar aproximadamente 1.5 a 2 cargas completas para la mayoría de los teléfonos inteligentes modernos.\n\nCables integrados: Incluye 4 cables incorporados compatibles con Micro USB/V8, Tipo C, Lightning y USB.\n\nPantalla: Cuenta con un indicador LCD para mostrar el nivel de carga.\n\nFunciones adicionales: Incorpora una linterna LED, un gancho colgante y una entrada USB.` },
            { id: 6, nombre: "Cargador para Coche", precio: "$7usd", disponible: true, img: "Cargador para coche.jpg", detalle: `Cargador de coche USB rápido con múltiples puertos.\n\n✅ Puertos: Cuenta con 4 puertos USB-A y 2 puertos USB Tipo-C para cargar hasta 6 dispositivos simultáneamente.\n\n✅ Velocidad: Soporta carga rápida, incluyendo tecnologías QC3.0 y PD (Power Delivery).\n\n✅ Funcionalidad: Incorpora una pantalla digital LED para mostrar el voltaje en tiempo real y protección contra sobrecargas.` },
            { id: 7, nombre: "Cables 1HORA", precio: "$700cup", disponible: true, img: "Cables 1HORA.jpg", detalle: `Cable de Tipo C / V8 / IPhone\n❇️ Marca 1HORA\n✅ Carga Rápida\n✅ Transferencia de Datos` },
            { id: 8, nombre: "Portacelular", precio: "$5usd", disponible: true, img: "Portacelular.jpg", detalle: `Soporte de alta seguridad para bicicletas y motos.` },
            { id: 9, nombre: "Tiras LED RGB", precio: "$8usd", disponible: true, img: "Tiras LED RGB.png", detalle: `Kit de 5 metros con control remoto y adaptador. Multicolores y recortables.` }
        ];

        const contenedor = document.getElementById('contenedor-productos');
        
        productos.forEach(p => {
            // Renderizado de tarjetas y modales
            contenedor.innerHTML += `
                <div class="col">
                    <div class="card">
                        <div class="img-container" data-bs-toggle="modal" data-bs-target="#modal${p.id}">
                            <img src="static/${p.img}" class="card-img-top" alt="${p.nombre}" onerror="this.src='https://via.placeholder.com/200x200?text=GvO+Imagen'">
                        </div>
                        <div class="card-body d-flex flex-column justify-content-between text-center">
                            <div class="mb-4">
                                <h6 class="card-title">${p.nombre}</h6>
                                <p class="precio-tag mb-0">${p.precio}</p>
                            </div>
                            <a href="https://wa.me/5358870159?text=Hola! Me interesa el ${p.nombre}" target="_blank" class="btn btn-whatsapp w-100">Comprar</a>
                        </div>
                    </div>
                </div>

                <div class="modal fade" id="modal${p.id}" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body text-center pt-0">
                                <div class="modal-img-wrapper shadow-sm">
                                    <img src="static/${p.img}" class="img-fluid" style="max-height: 220px;" alt="${p.nombre}" onerror="this.src='https://via.placeholder.com/200x200?text=GvO+Imagen'">
                                </div>
                                <h3 class="text-white mb-1" style="font-weight: 700;">${p.nombre}</h3>
                                <h4 class="precio-tag mb-4">${p.precio}</h4>
                                <p class="detalle-texto px-2">${p.detalle}</p>
                                <a href="https://wa.me/5358870159?text=Hola! Me interesa el ${p.nombre}" target="_blank" class="btn btn-whatsapp w-100 py-3 mt-4" style="font-size: 1rem;">
                                    Pedir por WhatsApp
                                </a>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        // Ocultar Loader al cargar la página
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("loader-wrapper").classList.add("loader-hidden");
            }, 600);
        });
    </script>
</body>
</html>
