<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GvO Accesorios Móviles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #00d4ff; --neon-green: #00ff87; --dark-bg: #0f172a; --card-bg: #1e293b; --danger-red: #ff4a5a; }
            #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .loader-container {
            position: relative;
            width: 100px;
            height: 100px;
        }

        /* Anillo Exterior (Azul) */
        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: var(--primary-blue);
            border-bottom-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        /* Anillo Interior (Verde) */
        .loader-ring-inner {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 4px solid transparent;
            border-left-color: var(--neon-green);
            border-right-color: var(--neon-green);
            border-radius: 50%;
            animation: spin-reverse 1s linear infinite;
        }

        .loader-logo {
            font-size: 1.5rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            to { transform: rotate(-360deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; filter: drop-shadow(0 0 5px var(--primary-blue)); }
            50% { opacity: 1; filter: drop-shadow(0 0 15px var(--neon-green)); }
        }

        .loader-text {
            margin-top: 25px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #f8f9fa;
            font-weight: 300;
            opacity: 0.8;
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }
        body { background-color: var(--dark-bg); color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .navbar { background: rgba(30, 41, 59, 0.8) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { font-weight: 600; background: linear-gradient(to right, var(--primary-blue), var(--neon-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .slogan-destacado { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; background: rgba(255, 255, 255, 0.03); padding: 10px 25px; border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 50px; }
        .card { background-color: var(--card-bg); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; overflow: hidden; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary-blue); }
        .card-img-top { background: white; padding: 10px; height: 180px; object-fit: contain; cursor: pointer; }
        .precio-tag { color: var(--neon-green); font-weight: bold; font-size: 1.2rem; }
        
        /* Etiquetas de Disponibilidad */
        .badge-stock { position: absolute; top: 10px; right: 10px; padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; z-index: 10; }
        .badge-disponible { background-color: rgba(0, 255, 135, 0.2); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .badge-agotado { background-color: rgba(255, 74, 90, 0.2); color: var(--danger-red); border: 1px solid var(--danger-red); }
        
        /* Botones de WhatsApp */
        .btn-whatsapp { background: linear-gradient(45deg, #25d366, #128c7e); border: none; color: white; font-weight: 600; border-radius: 12px; }
        .btn-whatsapp.disabled { background: #475569 !important; color: #94a3b8 !important; opacity: 0.6; pointer-events: none; }
        
        .modal-content { background-color: var(--card-bg); border-radius: 25px; border: 1px solid var(--primary-blue); }
        .btn-close { filter: invert(1); }
    </style>
</head>
<body>
    <div id="loader-wrapper">
        <div class="loader-container"><div class="loader-ring"></div></div>
        <div class="mt-3 small text-uppercase">Iniciando GvO Móviles...</div>
    </div>
    <nav class="navbar navbar-dark mb-4">
        <div class="container justify-content-center"><span class="navbar-brand">🔌 GvO ACCESORIOS MÓVILES</span></div>
    </nav>
    <div class="container">
        <div class="text-center mb-5"><div class="slogan-destacado">Calidad y rapidez en La Habana</div></div>
        <div class="row row-cols-2 row-cols-md-3 g-4" id="contenedor-productos"></div>
    </div>
    <footer class="text-center py-5 mt-5 border-top border-secondary border-opacity-25">
        <p>📍 La Habana, Cuba | 📞 +53 58870159</p>
        <div class="opacity-50 small">© 2026 GvO Accesorios Móviles</div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Nota: He cambiado el producto ID 3 (Cargador Moreka) a disponible: false para que veas cómo luce.
        const productos = [
            { id: 1, nombre: "Linterna Buytiti SD-559", precio: "$5000", disponible: true, img: "Linterna Buytiti.jpg", detalle: `Linterna Buytiti SD-559 recargable de alta potencia para uso táctico. Zoom telescópico e indicador de batería USB-C.` },
            { id: 2, nombre: "Cargador Samsung 45W", precio: "$5300", disponible: true, img: "Cargador Samsung 45W.jpg", detalle: `Cargador Samsung Travel Adapter de 45W con tecnología de carga superrápida 2.0. \n\n✅️Potencia: Ofrece una capacidad de carga de 45 vatios para dispositivos compatibles. \n\n✅️Tecnología: Cuenta con la tecnología Super Fast Charging 2.0 para una carga eficiente. \n\n✅️Conectividad: Incluye un cable USB tipo C a tipo C de 5 amperios. \n\n✅️Compatibilidad: Diseñado para teléfonos de gama alta como la serie Galaxy S20 Ultra, Note10+ y superiores.` },
            { id: 3, nombre: "Cargador Moreka 40W", precio: "$5300", disponible: true, img: "Cargador Moreka 40W .jpg", detalle: `Cargador Superrápido Moreka modelo AC111. \n\nPotencia: 40W en total, con puertos de 20W PD y 20W QC 3.0.\n\nContenido: Incluye el cubo cargador y un cable Tipo-C a Tipo-C de 1 metro.\n\nCaracterísticas: Cuenta con protección contra sobrecarga.` },
            { id: 4, nombre: "Power Bank Solar 30,000mAh", precio: "$19000", disponible: false, img: "Cargador Portátil 30000mAh.jpg", detalle: `Cargador Portátil de Panel Solar☀️ con múltiples cables integrados.\n✅️Capacidad: 30,000 mAh (111Wh/3.7V), lo que permite múltiples cargas completas para la mayoría de los teléfonos inteligentes.\n\n✅️Cables Integrados: \n✔️Tipo-C / V8 / (IPhone /iPad)\n✔️USB estándar: Para recargar la propia batería \n\n✅️Panel Solar con indicador.` },
            { id: 5, nombre: "Power Bank Buytiti 10,000mAh", precio: "$7500", disponible: false, img: "Cargador Portátil 10000mAh.jpg", detalle: `Cargador Portátil Buytiti de 10000mAh. \n\nCapacidad: 10000 mAh, capaz de proporcionar aproximadamente 1.5 a 2 cargas completas para la mayoría de los teléfonos inteligentes modernos. \n\nCables integrados: Incluye 4 cables incorporados compatibles con Micro USB/V8, Tipo C, Lightning y USB. \n\nPantalla: Cuenta con un indicador LCD para mostrar el nivel de carga. \n\nFunciones adicionales: Incorpora una linterna LED, un gancho colgante y una entrada USB.` },
            { id: 6, nombre: "Cargador para Coche", precio: "$4600", disponible: true, img: "Cargador para coche.jpg", detalle: `Cargador de coche USB rápido con múltiples puertos. \n\n✅️Puertos: Cuenta con 4 puertos USB-A y 2 puertos USB Tipo-C para cargar hasta 6 dispositivos simultáneamente.\n\n✅️Velocidad: Soporta carga rápida, incluyendo tecnologías QC3.0 y PD (Power Delivery).\n\n✅️Funcionalidad: Incorpora una pantalla digital LED para mostrar el voltaje en tiempo real y protección contra sobrecargas.` },
            { id: 7, nombre: "Cables 1HORA", precio: "$700cup", disponible: true, img: "Cables 1HORA.jpg", detalle: `Cable de Tipo C / V8 / IPhone \n Lay-Marca 1HORA\n✅️Carga Rápida \n✅️Transferencia de Datos` },
            { id: 8, nombre: "Portacelular", precio: "$3300", disponible: true, img: "Portacelular.jpg", detalle: `Soporte de alta seguridad para bicicletas y motos.` },
            { id: 9, nombre: "Tiras LED RGB", precio: "$5000", disponible: true, img: "Tiras LED RGB.png", detalle: `Kit de 5 metros con control remoto y adaptador. Multicolores y recortables.` }
        ];

        const contenedor = document.getElementById('contenedor-productos');
        productos.forEach(p => {
            // Lógica para determinar las etiquetas de disponibilidad y el estado del botón
            const stockBadge = p.disponible 
                ? `<span class="badge-stock badge-disponible">Disponible</span>` 
                : `<span class="badge-stock badge-agotado">Agotado</span>`;
            
            const btnLink = p.disponible 
                ? `href="https://wa.me/5358870159?text=Hola! Me interesa el ${p.nombre}"` 
                : `href="#"`;
                
            const btnClase = p.disponible ? '' : 'disabled';
            const btnTexto = p.disponible ? 'Comprar' : 'Agotado';
            const modalBtnTexto = p.disponible ? 'Pedir por WhatsApp' : 'Sin Stock';

            contenedor.innerHTML += `
                <div class="col">
                    <div class="card h-100 shadow-sm">
                        ${stockBadge}
                        <img src="static/${p.img}" class="card-img-top" data-bs-toggle="modal" data-bs-target="#modal${p.id}">
                        <div class="card-body text-center d-flex flex-column justify-content-between">
                            <div>
                                <h6 class="card-title mb-2" style="font-size:0.85rem">${p.nombre}</h6>
                                <p class="precio-tag mb-3">${p.precio}</p>
                            </div>
                            <a ${btnLink} class="btn btn-whatsapp btn-sm w-100 py-2 ${btnClase}">${btnTexto}</a>
                        </div>
                    </div>
                </div>
                <div class="modal fade" id="modal${p.id}" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content text-center p-4">
                            <div class="modal-header border-0"><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                            <div style="background:white; border-radius:15px; padding:10px" class="mb-3 position-relative">
                                ${stockBadge}
                                <img src="static/${p.img}" class="img-fluid" style="max-height:250px">
                            </div>
                            <h4 class="precio-tag">${p.precio}</h4>
                            <p class="small opacity-75">${p.detalle.replace(/\n/g, '<br>')}</p>
                            <a ${btnLink} class="btn btn-whatsapp w-100 py-3 mt-3 ${btnClase}">${modalBtnTexto}</a>
                        </div>
                    </div>
                </div>`;
        });
        window.addEventListener("load", () => {
            setTimeout(() => document.getElementById("loader-wrapper").classList.add("loader-hidden"), 600);
        });
    </script>
</body>
</html>
